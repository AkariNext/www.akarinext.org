# ローカル開発用: podman compose up -d / docker compose up -d
# CMS (PocketBase): http://localhost:8090 （管理画面は /_/）
# 初回はスーパーユーザーを作成すること:
#   docker compose exec pocketbase /pb/pocketbase superuser upsert admin@example.com <password> --dir /pb/pb_data
services:
  pocketbase:
    build: ./backend
    restart: always
    ports:
      - "8090:8090"
    environment:
      # Discord 通知（任意）
      DISCORD_WEBHOOK_POSTS: ""
      DISCORD_WEBHOOK_ANNOUNCEMENTS: ""
      PUBLIC_SITE_URL: "http://localhost:4321"
    volumes:
      - pocketbase_data:/pb/pb_data

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: akarinext_password
      DOCKER_INFLUXDB_INIT_ORG: akarinext
      DOCKER_INFLUXDB_INIT_BUCKET: server_metrics
    volumes:
      - influxdb_data:/var/lib/influxdb2

volumes:
  pocketbase_data:
  influxdb_data:
